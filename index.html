<html lang="fr">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Courses</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F3;
    --ink: #1A1814;
    --muted: #7A7570;
    --border: #E8E4DC;
    --accent: #2D6A4F;
    --accent-light: #E8F4EE;
    --accent-mid: #52B788;
    --warm: #D4A853;
    --warm-light: #FDF4E3;
    --carrefour: #004A99;
    --carrefour-light: #E6EFF8;
    --picnic: #E8481F;
    --picnic-light: #FEF0EC;
    --danger: #C0392B;
    --chip-bg: #EEEAE2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: var(--cream);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    letter-spacing: -0.01em;
  }
  header h1 span { color: var(--accent-mid); font-style: italic; }
  .header-count {
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 99px;
    display: none;
  }
  .header-count.visible { display: block; }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 60px);
  }

  .sidebar {
    background: white;
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }
  .sidebar-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 0.5rem;
    margin-bottom: 0.75rem;
  }
  .cat-nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    text-align: left;
    transition: background 0.15s;
    margin-bottom: 2px;
  }
  .cat-nav-btn:hover { background: var(--chip-bg); }
  .cat-nav-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .cat-nav-btn .cat-icon { font-size: 16px; width: 20px; text-align: center; }
  .cat-nav-btn .cat-checked {
    margin-left: auto;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    min-width: 28px;
    text-align: right;
  }

  .main { padding: 2rem; }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 1.5rem;
  }
  .search-bar input {
    flex: 1;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 16px; }

  .freq-filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .freq-chip {
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }
  .freq-chip:hover { border-color: var(--accent); color: var(--accent); }
  .freq-chip.active { background: var(--accent); border-color: var(--accent); color: white; }
  .freq-chip.all.active { background: var(--ink); border-color: var(--ink); color: white; }

  .section { margin-bottom: 2.5rem; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    padding-bottom: 8px;
    border-bottom: 1.5px solid var(--border);
  }
  .section-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
  }
  .section-icon { font-size: 20px; }
  .section-select-all {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .section-select-all:hover { background: var(--chip-bg); color: var(--ink); }

  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .item-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    user-select: none;
  }
  .item-card:hover { border-color: var(--accent-mid); }
  .item-card.checked {
    background: var(--accent-light);
    border-color: var(--accent);
  }
  .item-card.hidden { display: none; }
  .item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .item-brand {
    font-size: 11px;
    color: var(--muted);
  }
  .item-freq {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 99px;
    margin-top: 6px;
  }
  .freq-hebdo { background: #FDF4E3; color: #8B5E1A; }
  .freq-quinzaine { background: #E8F4EE; color: #1A6B3A; }
  .freq-mensuel { background: #E8EFF8; color: #1A3D6B; }
  .freq-other { background: var(--chip-bg); color: var(--muted); }
  .item-check {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
    color: transparent;
  }
  .item-card.checked .item-check {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .action-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .action-bar.visible { transform: translateY(0); }
  .action-summary {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
  }
  .action-summary strong { color: var(--ink); font-weight: 500; }
  .btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-picnic {
    background: var(--picnic);
    color: white;
  }
  .btn-picnic:hover { background: #C83A15; }
  .btn-carrefour {
    background: var(--carrefour);
    color: white;
  }
  .btn-carrefour:hover { background: #003580; }
  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { background: var(--chip-bg); color: var(--ink); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,24,20,0.55);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--cream);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 680px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 2rem;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
  }
  .modal-close {
    background: var(--chip-bg);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .picnic-list { list-style: none; }
  .picnic-section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 1.25rem 0 0.5rem;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .picnic-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 14px;
  }
  .picnic-item:last-child { border-bottom: none; }
  .picnic-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-mid); flex-shrink: 0; }
  .picnic-brand { color: var(--muted); font-size: 12px; margin-left: auto; }

  .carrefour-links { display: flex; flex-direction: column; gap: 8px; }
  .carrefour-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--ink);
    font-size: 13px;
    transition: border-color 0.15s;
  }
  .carrefour-link:hover { border-color: var(--carrefour); }
  .carrefour-link span { color: var(--carrefour); font-size: 12px; font-weight: 500; }

  .copy-btn {
    width: 100%;
    margin-top: 1rem;
    padding: 12px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .copy-btn:hover { background: #333; }
  .copy-btn.copied { background: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 14px; }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 1rem; }
    .action-bar { flex-wrap: wrap; padding: 1rem; }
    .items-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

</div>

<div class="action-bar" id="actionBar">

  <button class="btn btn-ghost" onclick="clearAll()">Tout effacer</button>
  <button class="btn btn-picnic" onclick="openPicnicModal()">📋 Liste Picnic</button>
  <button class="btn btn-carrefour" onclick="openCarrefourModal()">🚗 Carrefour Drive</button>
</div>

<div class="modal-overlay" id="picnicModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Liste pour Picnic</div>
      <button class="modal-close" onclick="closeModal('picnicModal')">✕</button>
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem;">Copie cette liste et utilise-la en parallèle de l'appli Picnic.</p>
    <ul class="picnic-list" id="picnicList"></ul>
    <button class="copy-btn" id="copyBtn" onclick="copyList()">Copier la liste</button>
  </div>
</div>

<div class="modal-overlay" id="carrefourModal">

</div>

const checked = new Set();
let activeFreq = 'all';
let searchQuery = '';

function freqClass(f) {
  if (f === 'Hebdo') return 'freq-hebdo';
  if (f === 'Quinzaine') return 'freq-quinzaine';
  if (f === 'Mensuel') return 'freq-mensuel';
  return 'freq-other';
}

function itemId(catId, idx) { return `${catId}_${idx}`; }

function buildUI() {
  const sectionsEl = document.getElementById('sections');
  const catNavEl = document.getElementById('catNav');
  sectionsEl.innerHTML = '';
  catNavEl.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const navBtn = document.createElement('button');
    navBtn.className = 'cat-nav-btn';
    navBtn.dataset.cat = cat.id;
    navBtn.innerHTML = `<span class="cat-icon">${cat.icon}</span>${cat.label}<span class="cat-checked" id="nav_${cat.id}"></span>`;
    navBtn.onclick = () => {
      document.getElementById('sec_' + cat.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    catNavEl.appendChild(navBtn);

    const section = document.createElement('div');
    section.className = 'section';
    section.id = 'sec_' + cat.id;

    section.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${cat.icon}</span>
        <h2>${cat.label}</h2>
        <button class="section-select-all" onclick="toggleSection('${cat.id}')">Tout cocher</button>
      </div>
      <div class="items-grid" id="grid_${cat.id}"></div>
    `;
    sectionsEl.appendChild(section);

    const grid = section.querySelector(`#grid_${cat.id}`);
    cat.items.forEach((item, idx) => {
      const id = itemId(cat.id, idx);
      const card = document.createElement('div');
      card.className = 'item-card';
      card.id = 'card_' + id;
      card.onclick = () => toggleItem(id);
      card.innerHTML = `
        <div class="item-check">✓</div>
        <div class="item-name">${item.name}</div>
        ${item.brand ? `<div class="item-brand">${item.brand}${item.qty ? ' · ' + item.qty : ''}</div>` : (item.qty ? `<div class="item-brand">${item.qty}</div>` : '')}
        <div><span class="item-freq ${freqClass(item.freq)}">${item.freq}</span></div>
      `;
      grid.appendChild(card);
    });
  });
}

function toggleItem(id) {
  if (checked.has(id)) checked.delete(id);
  else checked.add(id);
  updateUI();
}

function toggleSection(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const allChecked = cat.items.every((_, idx) => checked.has(itemId(catId, idx)));
  cat.items.forEach((_, idx) => {
    const id = itemId(catId, idx);
    if (allChecked) checked.delete(id);
    else checked.add(id);
  });
  updateUI();
}

function clearAll() {
  checked.clear();
  updateUI();
}

function updateUI() {
  // Update cards
  CATEGORIES.forEach(cat => {
    cat.items.forEach((item, idx) => {
      const id = itemId(cat.id, idx);
      const card = document.getElementById('card_' + id);
      if (!card) return;
      const visible = matchesFilter(item);
      card.classList.toggle('hidden', !visible);
      card.classList.toggle('checked', checked.has(id));
    });

    // Update nav count
    const count = cat.items.filter((_, idx) => checked.has(itemId(cat.id, idx))).length;
    const navCount = document.getElementById('nav_' + cat.id);
    if (navCount) navCount.textContent = count > 0 ? count : '';
  });

  // Action bar
  const total = checked.size;
  const actionBar = document.getElementById('actionBar');
  const headerCount = document.getElementById('headerCount');
  actionBar.classList.toggle('visible', total > 0);
  headerCount.classList.toggle('visible', total > 0);
  headerCount.textContent = `${total} produit${total > 1 ? 's' : ''}`;
  document.getElementById('actionSummary').innerHTML = `<strong>${total} produit${total > 1 ? 's' : ''}</strong> sélectionné${total > 1 ? 's' : ''}`;
}

function matchesFilter(item) {
  if (activeFreq !== 'all' && item.freq !== activeFreq) return false;
  if (searchQuery && !item.name.toLowerCase().includes(searchQuery) && !(item.brand && item.brand.toLowerCase().includes(searchQuery))) return false;
  return true;
}

function getCheckedItems() {
  const result = [];
  CATEGORIES.forEach(cat => {
    cat.items.forEach((item, idx) => {
      if (checked.has(itemId(cat.id, idx))) {
        result.push({ ...item, category: cat.label, catIcon: cat.icon });
      }
    });
  });
  return result;
}

function openPicnicModal() {
  const items = getCheckedItems();
  const list = document.getElementById('picnicList');
  list.innerHTML = '';
  const byCat = {};
  items.forEach(item => {
    if (!byCat[item.category]) byCat[item.category] = [];
    byCat[item.category].push(item);
  });
  Object.entries(byCat).forEach(([cat, catItems]) => {
    const title = document.createElement('li');
    title.className = 'picnic-section-title';
    title.textContent = cat;
    list.appendChild(title);
    catItems.forEach(item => {
      const li = document.createElement('li');
      li.className = 'picnic-item';
      li.innerHTML = `<span class="picnic-dot"></span><span>${item.name}${item.qty ? ' (' + item.qty + ')' : ''}</span>${item.brand ? `<span class="picnic-brand">${item.brand}</span>` : ''}`;
      list.appendChild(li);
    });
  });
  document.getElementById('picnicModal').classList.add('open');
}

function openCarrefourModal() {
  const items = getCheckedItems();
  const container = document.getElementById('carrefourLinks');
  container.innerHTML = '';
  items.forEach(item => {
    const query = encodeURIComponent((item.brand ? item.brand + ' ' : '') + item.name);
    const url = `https://www.carrefour.fr/recherche?q=${query}`;
    const link = document.createElement('a');
    link.className = 'carrefour-link';
    link.href = url;
    link.target = '_blank';
    link.rel = 'noopener';
    link.innerHTML = `<span>${item.catIcon} ${item.name}${item.brand ? ' <em style="color:var(--muted);font-style:normal;font-size:11px">· ${item.brand}</em>' : ''}</span><span>Rechercher →</span>`;
    container.appendChild(link);
  });
  document.getElementById('carrefourModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function copyList() {
  const items = getCheckedItems();
  const byCat = {};
  items.forEach(item => {
    if (!byCat[item.category]) byCat[item.category] = [];
    byCat[item.category].push(item);
  });
  let text = '🛒 MES COURSES\n\n';
  Object.entries(byCat).forEach(([cat, catItems]) => {
    text += `${cat}\n`;
    catItems.forEach(item => {
      text += `• ${item.name}${item.brand ? ' (' + item.brand + ')' : ''}${item.qty ? ' — ' + item.qty : ''}\n`;
    });
    text += '\n';
  });
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copié !';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copier la liste'; btn.classList.remove('copied'); }, 2000);
  });
}

// Filters
document.querySelectorAll('.freq-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.freq-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFreq = chip.dataset.freq;
    updateUI();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  updateUI();
});

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

buildUI();
updateUI();
</script>
